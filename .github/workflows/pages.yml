name: Publish Redoc to Pages

on:
  push:
    branches: [main]
    paths:
      - dist/openapi.yaml
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Render Redoc HTML
        run: |
          mkdir -p _site
          npx --yes @redocly/cli build-docs dist/openapi.yaml \
            --title "Blizzard Battle.net API (unofficial)" \
            -o _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
