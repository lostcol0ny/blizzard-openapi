components:
  securitySchemes:
    ClientCredentials:
      type: oauth2
      description: OAuth 2.0 Client Credentials flow for application-level access
      flows:
        clientCredentials:
          tokenUrl: https://oauth.battle.net/token
          scopes: {}
    AuthorizationCode:
      type: oauth2
      description: OAuth 2.0 Authorization Code flow for user-scoped profile access
      flows:
        authorizationCode:
          authorizationUrl: https://oauth.battle.net/authorize
          tokenUrl: https://oauth.battle.net/token
          scopes:
            wow.profile: Access WoW character profile data
            sc2.profile: Access StarCraft 2 profile data
            openid: OpenID Connect identity
  parameters:
    Namespace:
      name: namespace
      in: query
      required: true
      description: Namespace identifier combining data category and region (e.g. `static-us`, `dynamic-eu`, `profile-kr`)
      schema:
        type: string
    Locale:
      name: locale
      in: query
      required: false
      description: Locale for localized string fields (e.g. `en_US`, `de_DE`)
      schema:
        type: string
        enum:
        - en_US
        - es_MX
        - pt_BR
        - de_DE
        - en_GB
        - es_ES
        - fr_FR
        - it_IT
        - ru_RU
        - ko_KR
        - zh_TW
        - zh_CN
