components:
  securitySchemes:
    ClientCredentials:
      type: oauth2
      description: OAuth 2.0 Client Credentials flow for application-level access
      flows:
        clientCredentials:
          tokenUrl: https://oauth.battle.net/token
          scopes: {}
    AuthorizationCode:
      type: oauth2
      description: OAuth 2.0 Authorization Code flow for user-scoped profile access
      flows:
        authorizationCode:
          authorizationUrl: https://oauth.battle.net/authorize
          tokenUrl: https://oauth.battle.net/token
          scopes:
            wow.profile: Access WoW character profile data
            sc2.profile: Access StarCraft 2 profile data
            openid: OpenID Connect identity
  parameters:
    Namespace:
      name: namespace
      in: query
      required: true
