paths:
  /d3/profile/{battletag}/:
    get:
      operationId: get_account
      summary: Get a D3 account profile by BattleTag (``Name#1234``).
      tags:
      - diablo3-community
      parameters:
      - name: battletag
        in: path
        required: true
        schema:
          type: string
          pattern: ^[^-]+-\d{4,6}$
      - $ref: '#/components/parameters/Locale'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /d3/profile/{battletag}/hero/{hero_id}:
