paths:
  /sc2/static/profile/{region_id}:
    get:
      operationId: get_static_profile
      summary: Get static profile data for a StarCraft 2 region.
      tags:
      - sc2
      parameters:
      - name: region_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
      - $ref: '#/components/parameters/Locale'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '404':
          description: Not found
